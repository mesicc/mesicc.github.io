<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kemal Mešić — Web Developer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/responzivnost.css">
</head>
<body>

	<!-- ===================== NAVBAR ===================== -->
	<nav class="navbar" id="navbar">
		<div class="nav-inner">

			<!-- Logo -->
			<a href="#" class="nav-logo">
				<div class="nav-avatar-wrap">
					<img src="assets/images/logo.webp" alt="KM" class="nav-avatar" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
					<div class="nav-avatar-fallback" style="display:none">KM</div>
				</div>
				<span class="nav-logo-text">
					<span class="gradient-text">KM</span><span class="nav-logo-dot">.</span>
				</span>
			</a>

			<!-- Desktop nav (md+) -->
			<div class="nav-desktop">
				<div class="nav-links">
					<a href="#about" class="nav-link">About</a>
					<a href="#projects" class="nav-link">Projects</a>
					<a href="#contact" class="nav-link">Contact</a>
				</div>
				<button class="nav-lang" onclick="toggleLang()" aria-label="Toggle language">
					<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<circle cx="12" cy="12" r="10"/>
					<line x1="2" y1="12" x2="22" y2="12"/>
					<path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
					</svg>
					<span id="lang-label">BS</span>
				</button>
				<a href="#contact" class="nav-cta" id="nav-cta">Work with me</a>
			</div>

			<!-- Mobile controls (< md) -->
			<div class="nav-mobile-controls">
				<button class="nav-lang nav-lang-mobile" onclick="toggleLang()" aria-label="Toggle language">
					<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<circle cx="12" cy="12" r="10"/>
					<line x1="2" y1="12" x2="22" y2="12"/>
					<path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
					</svg>
					<span id="lang-label-mobile">BS</span>
				</button>
				<button class="nav-hamburger" id="hamburger" onclick="toggleMobile()" aria-label="Toggle menu">
					<!-- Hamburger icon -->
					<svg class="icon-hamburger" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
					<line x1="3" y1="6" x2="21" y2="6"/>
					<line x1="3" y1="12" x2="21" y2="12"/>
					<line x1="3" y1="18" x2="21" y2="18"/>
					</svg>
					<!-- X icon -->
					<svg class="icon-close" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
					<line x1="18" y1="6" x2="6" y2="18"/>
					<line x1="6" y1="6" x2="18" y2="18"/>
					</svg>
				</button>
			</div>
		</div>

		<!-- Mobile menu panel -->
		<div class="nav-mobile-menu glass" id="mobile-menu">
			<a href="#about" class="nav-mobile-link" onclick="closeMobile()">About</a>
			<a href="#projects" class="nav-mobile-link" onclick="closeMobile()">Projects</a>
			<a href="#contact" class="nav-mobile-link" onclick="closeMobile()">Contact</a>
			<a href="#contact" class="nav-mobile-cta" id="mobile-cta" onclick="closeMobile()">Work with me</a>
		</div>
	</nav>

	<section class="hero" id="home">

		<div class="hero-dot-bg"></div>
		<div class="hero-glow hero-glow-1"></div>
		<div class="hero-glow hero-glow-2"></div>

		<div class="hero-container">
			<div class="hero-image-wrap" id="hero-img-wrap">
				<div class="hero-img-glow"></div>
				<img src="assets/images/hero.webp" alt="Kemal Mešić" class="hero-img">
			</div>

			<div class="hero-text" id="hero-text">
				<p class="hero-tag" id="hero-tag">Web Developer · EE Student</p>

				<h1 class="hero-heading">
					<span id="hero-l1">Engineering</span><br>
					<span class="gradient-text" id="hero-l2">Digital</span><br>
					<span id="hero-l3">Experiences.</span>
				</h1>

				<p class="hero-sub" id="hero-sub">Based in Sarajevo, crafting robust web solutions.</p>

				<div class="hero-buttons">
					<a href="#contact" class="hero-btn-primary" id="hero-cta">Work with me</a>
					<a href="#projects" class="hero-btn-secondary" id="hero-projects">View Projects</a>
				</div>
			</div>
		</div>

		<!-- Scroll indikator -->
		<a href="#about" class="hero-scroll" id="hero-scroll" aria-label="Scroll down">
			<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
			<line x1="12" y1="5" x2="12" y2="19"/>
			<polyline points="19 12 12 19 5 12"/>
			</svg>
		</a>

	</section>

<script src="assets/js/main.js"></script>
</body>
</html>
